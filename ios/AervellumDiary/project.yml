name: AervellumDiary
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  ArgmaxOSS:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    revision: 99d0a2fc9e95f5a1d736f4fb04144f9e1b3a4b33

targets:
  AervellumDiary:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: ArgmaxOSS
        product: WhisperKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.AervellumDiary
        PRODUCT_NAME: Aervellum Diary
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Aervellum Diary
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.lifestyle
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Aervellum records your voice so it can create a private diary entry on this iPhone.
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SUPPORTS_MACCATALYST: NO
    scheme:
      testTargets: []
